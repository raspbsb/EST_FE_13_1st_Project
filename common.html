<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="css/normalize.css" />
    <link rel="stylesheet" href="css/reset.css" />
    <link rel="stylesheet" href="css/variables.css" />
    <link rel="stylesheet" href="css/common.css" />
    <link rel="stylesheet" href="css/index.css" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons"/>
  <title>Document</title>
</head>
<body>
  <article class="image-card-big">

    <div class="image-frame"></div>

    <div class="content">

      <div class="text-group">

        <div class="program-information">

          <span class="badge">Classification</span>
  
          <h3 class="program-title">
            Program Title
          </h3>
  
          <div class="clip-overtext">
            <p class="text-wrapper">
              Program Overview
            </p>
          </div>
        </div>

        <ul class="additional-information">

          <li class="period">
            <i class="material-icons">calendar_today</i>
            <span>period</span>
          </li>

          <li class="class-time">
            <i class="material-icons">schedule</i>
            <span>class time</span>
          </li>

        </ul>

      </div>

      <a href="/program-detail" class="cta-button-main">
        CTA btn Text
      </a>

    </div>

  </article>
  <div class="list-item">
    <img src="https://dummyimage.com/126x96/d9d9d9/555555&text=126x96" alt="image">
      <div class="text-body">
        <div class="classification">Notice</div>
        <div class="title">Title</div>
        <div class="data">Data</div>
      </div>
    </div>  
  </div>
